<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>
      <link rel="stylesheet" href="../style.css">
</head>
<body class="form-page">
    
<nav>
  <ul>
    <li class="completed">Step 1 : Account</li>
    <li class="current">Step 2 : Personal Details</li>
    <li class="next">Step 3 : Your Review</li>
  </ul>
</nav>


    
    <form>
      <fieldset>
        <legend>Personal Details</legend>

   
        <div>
            <label for="firstname" >First Name</label>

            <input type="text" id="firstname" name="firstname" placeholder="Enter First Name">
        </div>

   
        <div>
            <label for="lastname" >Last Name</label>

            <input type="text" id="lastname" name="lastname" placeholder="Enter Last Name">
        </div>


<div class="cnic-boxes">

    <input type="text" name="cnic1" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic2" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic3" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic4" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic5" maxlength="1" inputmode="numeric">

    <span>-</span>

    <input type="text" name="cnic6" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic7" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic8" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic9" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic10" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic11" maxlength="1" inputmode="numeric">
    <input type="text" name="cnic12" maxlength="1" inputmode="numeric">

    <span>-</span>

    <input type="text" name="cnic13" maxlength="1" inputmode="numeric">

</div>
    <div>
        <label for="socailLink">Social Link: </label>
        <input type="text" id="socailLink" name="socailLink" placeholder="Enter Facebook/linkedin Profile link">
    </div>

      <div class="form-buttons">
          <a href="../pages/account.html">
            <img src="../images/back.webp" alt="go back" />
          </a>

          <a href="../pages/review.html">
            <img src="../images/next.webp" alt="go to Personal details" />
          </a>
        </div>
      </fieldset>
    </form>
</body>
</html>
